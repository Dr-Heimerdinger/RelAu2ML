# docker-compose.dev.yml
# Lightweight compose file for development
# Use: docker compose -f docker-compose.dev.yml up -d
# This skips torch installation for faster dev cycles

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plexe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plexe}
      POSTGRES_DB: ${POSTGRES_DB:-plexe_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - plexe-net

  pgadmin:
    image: dpage/pgadmin4:7
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    networks:
      - plexe-net

  frontend:
    build:
      context: ./plexe/ui/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./plexe/ui/frontend/src:/app/src
      - ./plexe/ui/frontend/index.html:/app/index.html
      - ./plexe/ui/frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
      VITE_FRONTEND_PORT: ${FRONTEND_PORT:-3000}
    networks:
      - plexe-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_started
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
    volumes:
      - .:/app
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    networks:
      - plexe-net


volumes:
  postgres_data:

networks:
  plexe-net:
    driver: bridge
